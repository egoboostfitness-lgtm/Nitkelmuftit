<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nitkelmu Ftit Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f5;
  height:800vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  background:#6a0dad;
  color:white;
  padding:12px;
  font-size:18px;
}

/* MAIN LAYOUT */
#container{
  flex:1;
  display:flex;
 border-bottom:15px solid #d5c9e5;

}

/* SIDEBAR */
#onlineSidebar{
  width:220px;
  background:#e0d9f2;
  border-right:1px solid #ccc;
  overflow:auto;
}

.user{
  padding:10px;
  border-bottom:1px solid #d5c9e5;
  cursor:pointer;
}
.user:hover{background:#d5c9e5}

/* CHAT AREA */
#chatArea{
  flex:1;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE BUBBLES */
.msg{
  max-width:60%;
  padding:8px 10px;
  margin:5px;
  border-radius:10px;
  font-size:14px;
}

.me{
  background:#cbb3ff;
  align-self:flex-end;
}

.other{
  background:#fff;
  align-self:flex-start;
}

/* INPUT BAR */
#controls{
  display:flex;
  padding:10px;
  background:#ddd;
  
}

#message{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #aaa;
  outline:none;
}

button{
  margin-left:5px;
  padding:8px 12px;
  border:none;
  background:#6a0dad;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* LOGIN */
#loginBox{
  padding:30px;
  text-align:center;
}

.unread{
  font-weight:bold;
  color:#6a0dad;
}
</style>

</head>

<body>

<header id="chatHeader">Nitkelmu Ftit Chat</header>

<div id="loginBox">


<h3>Login</h3>
<input id="loginUsername" placeholder="Username"><br><br>
<input id="loginPassword" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<hr>

<h3>Don't have an account? Register for one!</h3>
<h3>Just use your email, choose your unique display name and verify!</h3>

<h3>Sign Up Here</h3>
<input id="signupEmail" placeholder="Email"><br><br>
<input id="signupUsername" placeholder="Username"><br><br>
<input id="signupPassword" type="password" placeholder="Password"><br><br>
<button onclick="signUp()">Sign Up</button>



</div>

<div id="container" style="display:none">

<!-- USERS -->
<div id="onlineSidebar">
<div class="user" onclick="switchRoom('general')"># General</div>
<div id="onlineList"></div>
</div>

<!-- CHAT -->
<div id="chatArea">
<div id="chat"></div>

<div id="controls">
<input id="message" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>
</div>
</div>

</div>

<script>
const SUPABASE_URL="https://ajcxjjbwoyugiwsslknw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqY3hqamJ3b3l1Z2l3c3Nsa253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NTYsImV4cCI6MjA4OTAwMzg1Nn0.jHYCwncqJf941ae-MNi1fEPgMcUiPW9iUPXRcdLsXU8";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let key="global-secret-key-123";
let username="";
let room="general";
let privateChatUser=null;
let channel=null;

// Track unread messages
let unread={};

const chat=document.getElementById("chat");
const onlineList=document.getElementById("onlineList");

/* ENCRYPT */
function encrypt(t){return CryptoJS.AES.encrypt(t,key).toString();}
function decrypt(t){
try{return CryptoJS.AES.decrypt(t,key).toString(CryptoJS.enc.Utf8)||"[error]";}
catch{return "[encrypted]";}
}

/* SIGN UP */
async function signUp(){
const email=signupEmail.value;
const uname=signupUsername.value;
const pass=signupPassword.value;

await client.auth.signUp({email,password:pass});
await client.from("profiles").insert({email,username:uname});
alert("Account created");
}

/* LOGIN */
async function login(){

const uname=loginUsername.value;
const pass=loginPassword.value;

const {data:profile}=await client.from("profiles").select("*").eq("username",uname).single();

const {error}=await client.auth.signInWithPassword({
email:profile.email,
password:pass
});

if(error){alert(error.message);return;}

username=uname;

loginBox.style.display="none";
container.style.display="flex";

loadMessages();
updateOnline();
subscribeMessages();
}

/* RENDER */
function renderMessage(m){

// Check if private chat
let target = m.private_to ? m.username : m.room;

// If not current open chat/room, increment unread
if((privateChatUser && m.username !== privateChatUser) || (!privateChatUser && m.room !== room)){
    if(!unread[target]) unread[target]=0;
    unread[target]++;
    updateSidebar();
    return;
}

const div=document.createElement("div");
div.className="msg "+(m.username===username?"me":"other");
let text = decrypt(m.message);

// Show username ONLY in group chat
if(!privateChatUser){
  div.innerHTML = "<b style='font-size:12px;color:#6a0dad'>" + m.username + "</b><br>" + text;
}else{
  div.innerHTML = text;
}
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* LOAD */
async function loadMessages(){

let query=client.from("messages").select("*").order("created_at",{ascending:true});

if(privateChatUser){
query=query.or(`and(username.eq.${username},private_to.eq.${privateChatUser}),and(username.eq.${privateChatUser},private_to.eq.${username})`);
}else{
query=query.eq("room",room).is("private_to",null);
}

const {data}=await query;

chat.innerHTML="";
data.forEach(renderMessage);

document.getElementById("chatHeader").innerText =
privateChatUser ? privateChatUser : "# "+room;

// Reset unread
if(privateChatUser) unread[privateChatUser]=0;
else unread[room]=0;
updateSidebar();
}

/* SEND */
async function sendMessage(){
const text=message.value;
if(!text) return;

await client.from("messages").insert({
username,
message:encrypt(text),
room,
private_to:privateChatUser
});

message.value="";
}

/* ENTER KEY */
message.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* REALTIME */
function subscribeMessages(){

if(channel) client.removeChannel(channel);

channel=client.channel("chat");

channel.on("postgres_changes",{
event:"INSERT",
schema:"public",
table:"messages"
},payload=>{
renderMessage(payload.new);
}).subscribe();
}

/* ONLINE USERS */
async function updateOnline(){

await client.from("online_users").upsert({
username,
last_seen:new Date()
});

const {data}=await client.from("online_users").select("*");

const active=data.filter(u=>new Date()-new Date(u.last_seen)<30000);

onlineList.innerHTML=active.map(u=>{
let name=u.username;
let badge=unread[name]?` <span class="unread">(${unread[name]})</span>`:"";
return `<div class="user" onclick="startPrivate('${name}')">${name}${badge}</div>`;
}).join("");
}

setInterval(updateOnline,5000);

/* PRIVATE CHAT */
function startPrivate(u){
privateChatUser=u;
chat.innerHTML="";
loadMessages();
}

/* SWITCH ROOM */
function switchRoom(r){
room=r;
privateChatUser=null;
chat.innerHTML="";
loadMessages();
}
</script>

</body>
</html>
