<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
background:#075e54;
color:white;
padding:12px;
font-size:18px;
}

/* MAIN LAYOUT */
#container{
flex:1;
display:flex;
}

/* SIDEBAR */
#onlineSidebar{
width:220px;
background:#fff;
border-right:1px solid #ddd;
overflow:auto;
}

.user{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}
.user:hover{background:#f5f5f5}

/* CHAT AREA */
#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* MESSAGE BUBBLES */
.msg{
max-width:60%;
padding:8px 10px;
margin:5px;
border-radius:10px;
font-size:14px;
}

.me{
background:#dcf8c6;
align-self:flex-end;
}

.other{
background:#fff;
align-self:flex-start;
}

/* INPUT BAR */
#controls{
display:flex;
padding:10px;
background:#f0f0f0;
}

#message{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

button{
margin-left:5px;
padding:8px 12px;
border:none;
background:#075e54;
color:white;
border-radius:6px;
cursor:pointer;
}

/* LOGIN */
#loginBox{
padding:30px;
text-align:center;
}

</style>
</head>

<body>

<header id="chatHeader">Secure Chat</header>

<div id="loginBox">

<h3>Sign Up</h3>
<input id="signupEmail" placeholder="Email"><br><br>
<input id="signupUsername" placeholder="Username"><br><br>
<input id="signupPassword" type="password" placeholder="Password"><br><br>
<button onclick="signUp()">Sign Up</button>

<hr>

<h3>Login</h3>
<input id="loginUsername" placeholder="Username"><br><br>
<input id="loginPassword" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

</div>

<div id="container" style="display:none">

<!-- USERS -->
<div id="onlineSidebar">
<div class="user" onclick="switchRoom('general')"># General</div>
<div id="onlineList"></div>
</div>

<!-- CHAT -->
<div id="chatArea">
<div id="chat"></div>

<div id="controls">
<input id="message" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>
</div>
</div>

</div>

<script>
const SUPABASE_URL="https://ajcxjjbwoyugiwsslknw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqY3hqamJ3b3l1Z2l3c3Nsa253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NTYsImV4cCI6MjA4OTAwMzg1Nn0.jHYCwncqJf941ae-MNi1fEPgMcUiPW9iUPXRcdLsXU8";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let key="global-secret-key-123";
let username="";
let room="general";
let privateChatUser=null;
let channel=null;

const chat=document.getElementById("chat");
const onlineList=document.getElementById("onlineList");

/* ENCRYPT */
function encrypt(t){return CryptoJS.AES.encrypt(t,key).toString();}
function decrypt(t){
try{return CryptoJS.AES.decrypt(t,key).toString(CryptoJS.enc.Utf8)||"[error]";}
catch{return "[encrypted]";}
}

/* SIGN UP */
async function signUp(){
const email=signupEmail.value;
const uname=signupUsername.value;
const pass=signupPassword.value;

await client.auth.signUp({email,password:pass});
await client.from("profiles").insert({email,username:uname});
alert("Account created");
}

/* LOGIN */
async function login(){

const uname=loginUsername.value;
const pass=loginPassword.value;

const {data:profile}=await client.from("profiles").select("*").eq("username",uname).single();

const {error}=await client.auth.signInWithPassword({
email:profile.email,
password:pass
});

if(error){alert(error.message);return;}

username=uname;

loginBox.style.display="none";
container.style.display="flex";

loadMessages();
updateOnline();
subscribeMessages();
}

/* RENDER */
function renderMessage(m){

if(privateChatUser){
if(!(
(m.username===username && m.private_to===privateChatUser) ||
(m.username===privateChatUser && m.private_to===username)
)) return;
}else{
if(m.room!==room || m.private_to) return;
}

const div=document.createElement("div");

div.className="msg "+(m.username===username?"me":"other");

div.innerHTML=decrypt(m.message);

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* LOAD */
async function loadMessages(){

let query=client.from("messages").select("*").order("created_at",{ascending:true});

if(privateChatUser){
query=query.or(`and(username.eq.${username},private_to.eq.${privateChatUser}),and(username.eq.${privateChatUser},private_to.eq.${username})`);
}else{
query=query.eq("room",room).is("private_to",null);
}

const {data}=await query;

chat.innerHTML="";
data.forEach(renderMessage);

document.getElementById("chatHeader").innerText =
privateChatUser ? privateChatUser : "# "+room;
}

/* SEND */
async function sendMessage(){

const text=message.value;
if(!text) return;

await client.from("messages").insert({
username,
message:encrypt(text),
room,
private_to:privateChatUser
});

message.value="";
}

/* ENTER KEY */
message.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* REALTIME */
function subscribeMessages(){

if(channel) client.removeChannel(channel);

channel=client.channel("chat");

channel.on("postgres_changes",{
event:"INSERT",
schema:"public",
table:"messages"
},payload=>{
renderMessage(payload.new);
}).subscribe();
}

/* ONLINE USERS */
async function updateOnline(){

await client.from("online_users").upsert({
username,
last_seen:new Date()
});

const {data}=await client.from("online_users").select("*");

const active=data.filter(u=>new Date()-new Date(u.last_seen)<30000);

onlineList.innerHTML=active.map(u=>
`<div class="user" onclick="startPrivate('${u.username}')">${u.username}</div>`
).join("");
}

setInterval(updateOnline,5000);

/* PRIVATE CHAT */
function startPrivate(u){
privateChatUser=u;
chat.innerHTML="";
loadMessages();
}

function switchRoom(r){
room=r;
privateChatUser=null;
loadMessages();
}
</script>

</body>
</html>
