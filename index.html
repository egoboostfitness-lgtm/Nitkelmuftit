<style>
body{font-family:Arial;margin:0;background:#f2f2f2;display:flex;flex-direction:column;height:100vh;}
header{background:#4a6cff;color:white;padding:10px;text-align:center;}
#container{display:flex;flex:1;}
#rooms{width:200px;background:#ddd;padding:10px;}
.room{cursor:pointer;padding:5px;}
#chatArea{flex:1;display:flex;flex-direction:column;}
#chat{flex:1;overflow:auto;background:white;padding:10px;}
#controls{padding:10px;background:#fafafa;}

<body>

<div id="loginBox">

</div>
<video id="camera" autoplay></video>
<button onclick="captureImage()">Capture</button>
</div>

<div id="onlineSidebar">
<b>Online Users</b>
<div id="onlineList"></div>
</div>
</div>

<script>

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqY3hqamJ3b3l1Z2l3c3Nsa253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NTYsImV4cCI6MjA4OTAwMzg1Nn0.jHYCwncqJf941ae-MNi1fEPgMcUiPW9iUPXRcdLsXU8";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user=null, username="", room="general", capturedImage=null, lastMessageTime=0, isAdmin=false, secretKey=null;
const chat=document.getElementById("chat");

const typingIndicator=document.getElementById("typing");

// ----------------- Auth -----------------
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const chosenUsername = document.getElementById("username").value.trim();
  if (!chosenUsername) { alert("Enter a username"); return; }

  // Check if username is taken
  const { data: exists } = await client.from("profiles").select("*").eq("username", chosenUsername).single();
  if (exists) { alert("Username taken"); return; }

  const { data, error } = await client.auth.signUp({ email, password });
  if (error) { alert(error.message); return; }

  // Save username in profiles table
  await client.from("profiles").insert({ email, username: chosenUsername });

  alert("Account created. Check email verification.");
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({ email, password });
  if (error) { alert(error.message); return; }

  user = data.user;

  // Get username from profiles table
  const { data: profile } = await client.from("profiles").select("*").eq("email", user.email).single();
  username = profile?.username || user.email;

  secretKey = localStorage.getItem("chatSecretKey") || CryptoJS.lib.WordArray.random(16).toString();
  localStorage.setItem("chatSecretKey", secretKey);

  await checkAdmin();
  showChat();
}

async function facebookLogin(){await client.auth.signInWithOAuth({provider:'facebook'});}
async function checkAdmin(){
  const {data}=await client.from("admins").select("*").eq("email",user.email).single();
  if(data) isAdmin=true;
}

function showChat(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("container").style.display="flex";
  loadMessages();
  updateOnline();
}

// ----------------- Chat -----------------
function addEmoji(e){document.getElementById("message").value+=e;}
function switchRoom(r){room=r;chat.innerHTML="";loadMessages();}
function encryptMessage(msg){return CryptoJS.AES.encrypt(msg, secretKey).toString();}
function decryptMessage(cipher){try{return CryptoJS.AES.decrypt(cipher, secretKey).toString(CryptoJS.enc.Utf8);}catch{return "[Encrypted]";}}

function addMessage(m){
  if(m.room!==room && m.private_to!==username && m.username!==user.email) return;
  let div=document.createElement("div");
  div.className="msg";
  let text=decryptMessage(m.message);
  div.innerHTML="<b>"+(m.display_name||m.username)+"</b>: "+text+(m.edited?" (edited)":"");

  if(m.image){
    let img=document.createElement("img");
    img.src=decryptMessage(m.image);
    div.appendChild(img);
    let reportBtn=document.createElement("button");
    reportBtn.innerText="Report Abuse";
    reportBtn.onclick=()=>reportAbuse(m.id,m.username);
    div.appendChild(reportBtn);
  }

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// ----------------- Load & Send -----------------
async function loadMessages(){
  const {data}=await client.from("messages")
    .select("*")
    .or(`room.eq.${room},private_to.eq.${username},username.eq.${user.email}`)
    .order("created_at",{ascending:true}).limit(50);
  chat.innerHTML="";
  if(data)data.forEach(addMessage);
}

async function sendMessage(){
  const text=document.getElementById("message").value;
  const privateTo=document.getElementById("privateUser").value;
  const now=Date.now();
  if(now-lastMessageTime<2000){alert("Slow down!"); return;}
  lastMessageTime=now;
  if(text.length>200){alert("Message too long"); return;}
  const spam=["http","www",".com",".ru",".xyz"];
  for(let w of spam) if(text.includes(w)){alert("Links not allowed"); return;}
  await client.from("messages").insert([{
  username: user.email,         // the user's email
  display_name: username,       // <- this is Step 4: ensures the username shows
  message: encryptMessage(text),
  room: room,
  private_to: privateTo || null,
  image: capturedImage ? encryptMessage(capturedImage) : null
}]);
  capturedImage=null;
  document.getElementById("message").value="";
  document.getElementById("privateUser").value="";
}

// ----------------- Camera -----------------
async function startCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({video:true});
  document.getElementById("camera").srcObject=stream;
}
function captureImage(){
  const video=document.getElementById("camera");
  const canvas=document.createElement("canvas");
  canvas.width=200; canvas.height=150;
  canvas.getContext("2d").drawImage(video,0,0,200,150);
  const data=canvas.toDataURL("image/jpeg",0.5);
  if(data.length>100000){alert("Image too large"); return;}
  capturedImage=data;
  alert("Image captured");
}

// ----------------- Online Users -----------------
async function updateOnline() {

  if(!username) return;

  // update my presence
  await client
    .from("online_users")
    .upsert({
      username: username,
      last_seen: new Date()
    });

  // fetch users
  const { data } = await client
    .from("online_users")
    .select("*");

  if(!data) return;

  const now = new Date();

  const activeUsers = data.filter(u =>
    (now - new Date(u.last_seen)) < 30000
  );

  onlineList.innerHTML = activeUsers
    .map(u =>
      `<div style="cursor:pointer;color:blue" onclick="setPrivate('${u.username}')">${u.username}</div>`
    )
    .join("");
}

// ----------------- Typing Indicator -----------------
document.getElementById("message").addEventListener("input",async()=>{
  await client.from("typing").upsert({username,room,timestamp:new Date()});
});

// ----------------- Realtime -----------------
client.channel("public:messages")
  .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},payload=>{
    const m=payload.new;
    if(m.room===room || m.private_to===username || m.username===user.email)addMessage(m);
  })
  .subscribe();

</script>
